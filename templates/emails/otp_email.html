<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica Neue, Arial, sans-serif;">
    <div style="max-width: 600px; margin: 0 auto; padding: 40px 20px;">
        <div style="background: linear-gradient(135deg, #FF6B2C 0%, #fdfdfdff 100%); border-radius: 12px; padding: 40px; text-align: center; box-shadow: 0 4px 6px rgba(55, 53, 53, 0.1);">
            <h1 style="color: #ffffff; margin: 0 0 10px 0; font-size: 24px; font-weight: 600;">Verification Code</h1>
            <p style="color: #f0f0f0; margin: 0 0 30px 0; font-size: 14px;">Enter this code to continue</p>
            
            <div style="background: #ffffff; border-radius: 8px; padding: 20px; margin: 0 auto; display: inline-block;">
                <span style="font-size: 36px; font-weight: 700; letter-spacing: 8px; color: #FF6B2C;">{{ otp_code }}</span>
            </div>
            
            <p style="color: #f0f0f0; margin: 30px 0 0 0; font-size: 13px;">
                This code expires in <strong>{{ expiration_minutes }} minutes</strong>
            </p>
        </div>
        
        <p style="text-align: center; color: #666; font-size: 12px; margin-top: 20px;">
            If you didn't request this code, please ignore this email.
        </p>
    </div>
</body>
</html>
